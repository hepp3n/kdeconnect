[package]
name = "kdeconnect-cli"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0.95"
dirs = "6.0.0"
hostname = "0.4.0"
thiserror = "2.0.11"
rustls = { version = "0.23.15", features = ["std"] }
native-tls = "0.2"
ron = "0.8.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1.13.1", features = ["v4"] }
time = "0.3.37"
openssl = "0.10.70"
webpki-roots = "0.26"
